name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  validate:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Release preflight validation
        shell: pwsh
        run: |
          .\scripts\validate-release.ps1 `
            -Version "${env:GITHUB_REF_NAME}".TrimStart('v') `
            -SkipWebsite `
            -SkipUnityMatrix

  build:
    needs: validate
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: ucp-linux-x64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: ucp-darwin-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: ucp-darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: ucp-win32-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --manifest-path cli/Cargo.toml --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: cp cli/target/${{ matrix.target }}/release/ucp ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: Copy-Item "cli\target\${{ matrix.target }}\release\ucp.exe" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare bundled CLI archives
        run: |
          mkdir -p artifacts/bundles

          prepare_bundle() {
            artifact="$1"
            executable_name="$2"
            bundle_dir="artifacts/bundles/${artifact}"
            mkdir -p "${bundle_dir}/bridge"
            cp "artifacts/${artifact}" "${bundle_dir}/${executable_name}"
            cp -R unity-package/com.ucp.bridge "${bundle_dir}/bridge/com.ucp.bridge"
            (
              cd artifacts/bundles
              zip -r "../${artifact}.zip" "${artifact}" >/dev/null
            )
          }

          prepare_bundle ucp-linux-x64 ucp
          prepare_bundle ucp-darwin-x64 ucp
          prepare_bundle ucp-darwin-arm64 ucp
          prepare_bundle ucp-win32-x64.exe ucp.exe

      - name: Compute checksums
        run: |
          cd artifacts
          sha256sum ucp-* > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { capture=1; next }
            capture && $0 ~ "^## \\[" { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "Failed to extract release notes for ${VERSION} from CHANGELOG.md" >&2
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            artifacts/ucp-linux-x64
            artifacts/ucp-darwin-x64
            artifacts/ucp-darwin-arm64
            artifacts/ucp-win32-x64.exe
            artifacts/ucp-linux-x64.zip
            artifacts/ucp-darwin-x64.zip
            artifacts/ucp-darwin-arm64.zip
            artifacts/ucp-win32-x64.exe.zip
            artifacts/checksums-sha256.txt

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Validate synced metadata
        run: node scripts/sync-version.mjs --check "${GITHUB_REF_NAME#v}"

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd npm
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Bundle bridge payload into npm package
        run: |
          rm -rf npm/bridge
          mkdir -p npm/bridge
          cp -R unity-package/com.ucp.bridge npm/bridge/com.ucp.bridge

      - name: Check whether npm version already exists
        id: npm-version
        run: |
          PACKAGE_NAME=$(node -p "require('./npm/package.json').name")
          VERSION="${GITHUB_REF_NAME#v}"
          if npm view "${PACKAGE_NAME}@${VERSION}" version --registry https://registry.npmjs.org >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE_NAME}@${VERSION} is already published; skipping npm publish."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npmjs
        if: steps.npm-version.outputs.published != 'true'
        run: cd npm && npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
